services:
  build-certs:
    image: docker.io/library/alpine:latest
    command: |
      sh -c '
      mkdir -p /certs;
      if [ ! -f /certs/cert.pem ]; then
        apk add --no-cache openssl
        openssl req -x509 -nodes -days 7 -newkey rsa:2048 \
          -keyout /certs/privkey.pem \
          -out /certs/cert.pem \
          -subj '/CN=localhost';
      fi'
    volumes:
      - ./dev-certs:/certs

  web:
    build:
      dockerfile: WEB.Dockerfile
      context: frontend
      args:
        # for some reason, I am unable to read this value from the .env
        # so I will hardcode it, its not like docker-compose is used for deployment or development
        # so I dont have an issue with having this hardcoded
        VITE_API_BASE_URL: "http://localhost:8080"
    ports:
      - 5173:443
    volumes:
      - ./dev-certs:/certs:ro
    depends_on:
      build-certs:
        condition: service_completed_successfully

  migrations:
    image: docker.io/migrate/migrate:latest
    command: ["-database", "postgres://koopify:koopify@db:5432/koopify?sslmode=disable", "-path", "/migrations", "up"]
    volumes:
      - ./backend/sql/migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      dockerfile: API.Dockerfile
      context: backend
    environment:
      JWT_SECRET: ${JWT_SECRET}
      PGDB: postgres://koopify:koopify@db:5432/koopify?sslmode=disable
      ADYEN_API_KEY: ${ADYEN_API_KEY}
      ADYEN_MERCHANT_ACCOUNT: ${ADYEN_MERCHANT_ACCOUNT}
      ADYEN_THEME_ID: ${ADYEN_THEME_ID}
      CHECKOUT_RETURN_URL: ${CHECKOUT_RETURN_URL}
    ports:
      - 8080:8080
    depends_on:
      migrations:
        condition: service_completed_successfully

  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: koopify
      POSTGRES_PASSWORD: koopify
      POSTGRES_DB: koopify
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koopify"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
